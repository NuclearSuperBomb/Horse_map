<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RDR2 Interactive Map</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #1a1a1a; color: white; }
        #sidebar { width: 250px; background: #2c2c2c; padding: 20px; height: 100vh; overflow-y: auto; }
        #map-container { flex-grow: 1; position: relative; overflow: auto; background: #000; }
        
        img { display: block; max-width: none; } /* Mantiene la dimensione reale della mappa */
        
        .poi {
            position: absolute;
            width: 20px; height: 20px;
            background: red; border-radius: 50%;
            cursor: pointer; transform: translate(-50%, -50%);
            border: 2px solid white;
        }

        /* Tooltip che appare al passaggio del mouse */
        .poi:hover::after {
            content: attr(data-name);
            position: absolute; top: -30px; left: 50%;
            transform: translateX(-50%);
            background: black; padding: 5px 10px;
            border-radius: 5px; white-space: nowrap; font-size: 14px;
        }

        .list-item { 
            padding: 10px; cursor: pointer; border-bottom: 1px solid #444; 
        }
        .list-item:hover { background: #444; }
        
        .highlight { box-shadow: 0 0 15px 5px yellow; border-color: yellow; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Punti di Interesse</h3>
    <div id="point-list"></div>
</div>

<div id="map-container" id="container">
    <!-- Cambia il link con quello della tua immagine -->
    <img src="https://files.catbox.moe/enqjwl.jpg" id="map-img">
    <div id="markers"></div>
</div>

<script>
    // 2. AGGIUNGI QUI I TUOI PUNTI (X e Y sono le coordinate in pixel)
    const points = [
        { name: "Stazione Ferroviaria", x: 5070, y: 12508 },
        { name: "Accampamento", x: 6000, y: 11000 },
        { name: "Ponte Vecchio", x: 7500, y: 12000 }
    ];

    const markersDiv = document.getElementById('markers');
    const listDiv = document.getElementById('point-list');
    const container = document.getElementById('map-container');

    points.forEach((p, index) => {
        // Crea il pallino sulla mappa
        const marker = document.createElement('div');
        marker.className = 'poi';
        marker.style.left = p.x + 'px';
        marker.style.top = p.y + 'px';
        marker.setAttribute('data-name', p.name);
        marker.id = 'marker-' + index;
        markersDiv.appendChild(marker);

        // Crea l'elemento nella lista laterale
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerText = p.name;
        item.onclick = () => {
            // Centra la mappa sul punto cliccato
            container.scrollTo({
                left: p.x - (container.clientWidth / 2),
                top: p.y - (container.clientHeight / 2),
                behavior: 'smooth'
            });
            // Effetto flash sul marker
            marker.classList.add('highlight');
            setTimeout(() => marker.classList.remove('highlight'), 2000);
        };
        listDiv.appendChild(item);
    });
</script>

</body>
</html>
