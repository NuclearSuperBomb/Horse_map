<!DOCTYPE html>
<html>
<head>
    <title>RDR2 Interactive Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Carica Leaflet CSS/JS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        body { margin: 0; display: flex; background: #1a1a1a; color: white; font-family: sans-serif; }
        #sidebar { width: 250px; height: 100vh; background: #2c2c2c; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; height: 100vh; background: #000; }
        .list-item { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; }
        .list-item:hover { background: #3d3d3d; }
        h3 { padding: 10px; margin: 0; background: #111; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Punti di Interesse</h3>
    <div id="point-list"></div>
</div>

<div id="map"></div>

<script>
    // 1. Configurazione Immagine
    const imageUrl = 'https://files.catbox.moe/enqjwl.jpg'; // Assicurati che il nome sia corretto
    const imageWidth = 10000;  // Inserisci la larghezza reale in pixel della tua immagine
    const imageHeight = 8000;  // Inserisci l'altezza reale in pixel della tua immagine

    // 2. Creazione della Mappa
    const map = L.map('map', {
        crs: L.CRS.Simple, // Sistema di coordinate basato sui pixel, non sulla Terra
        minZoom: -3,       // Permette di rimpicciolire per vedere tutta la mappa
        maxZoom: 1,        // Permette di zoomare molto vicino
    });

    const bounds = [[0, 0], [imageHeight, imageWidth]];
    L.imageOverlay(imageUrl, bounds).addTo(map);
    map.fitBounds(bounds); // Adatta automaticamente l'immagine allo schermo all'avvio

    // 3. Punti di Interesse (Usa le coordinate Y e X invertite: [Altezza, Larghezza])
    // Nota: in Leaflet.js [0,0] è l'angolo in basso a sinistra.
    const points = [
        { name: "Stazione Ferroviaria", coords: [12508, 5070] },
        { name: "Accampamento", coords: [11000, 6000] }
    ];

    const listDiv = document.getElementById('point-list');

    points.forEach(p => {
        // Aggiunge il Marker sulla mappa
        const marker = L.marker(p.coords).addTo(map).bindPopup(p.name);

        // Aggiunge l'elemento alla lista laterale
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerText = p.name;
        item.onclick = () => {
            map.setView(p.coords, 0); // Sposta la visuale sul punto
            marker.openPopup();       // Apre il fumetto col nome
        };
        listDiv.appendChild(item);
    });
</script>

</body>
</html>
