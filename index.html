<!DOCTYPE html>
<html>
<head>
    <title>RDR2 Railroad Map</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; display: flex; background: #121212; color: #e0e0e0; font-family: sans-serif; height: 100vh; }
        #sidebar { width: 250px; background: #1e1e1e; overflow-y: auto; border-right: 1px solid #333; }
        #map { flex-grow: 1; background: #000; cursor: crosshair; }
        .list-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .list-item:hover { background: #2a2a2a; color: #ffcc00; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffcc00; z-index: 2000; }
    </style>
</head>
<body>

<div id="loading">Caricamento Mappa (60MB)... attendi qualche secondo</div>

<div id="sidebar">
    <h3 style="text-align:center; color:#ffcc00">PUNTI FERROVIARI</h3>
    <div id="point-list"></div>
</div>

<div id="map"></div>

<script>
    const url = 'https://files.catbox.moe';

    // 1. Setup Mappa semplificato
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -2,
        maxZoom: 2
    });

    // Usiamo coordinate fisse 0-1000 per semplicità
    const bounds = [[0, 0], [1000, 1000]];
    const image = L.imageOverlay(url, bounds).addTo(map);

    map.fitBounds(bounds);

    // Nasconde il testo "Caricamento" quando l'immagine è pronta
    image.on('load', function() {
        document.getElementById('loading').style.display = 'none';
    });

    // 2. PUNTI DI ESEMPIO (Usa numeri tra 0 e 1000)
    // [Y, X] -> 0 è il basso/sinistra, 1000 è l'alto/destra
    const points = [
        { name: "Punto di Test", coords: [500, 500] }
    ];

    const listDiv = document.getElementById('point-list');
    points.forEach(p => {
        const marker = L.marker(p.coords).addTo(map).bindPopup(p.name);
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerText = p.name;
        item.onclick = () => { map.setView(p.coords, 1); marker.openPopup(); };
        listDiv.appendChild(item);
    });

    // 3. LOG COORDINATE (Premi F12 e guarda la Console per i tuoi nuovi punti)
    map.on('click', function(e) {
        console.log("Copia queste coordinate: [" + e.latlng.lat.toFixed(1) + ", " + e.latlng.lng.toFixed(1) + "]");
    });
</script>
</body>
</html>
