<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RDR2 Railroad Map - Community Editor</title>
    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
        body { display: flex; font-family: sans-serif; }
        #sidebar { width: 250px; background: #1a1a1a; color: white; border-right: 1px solid #333; overflow-y: auto; z-index: 1000; }
        #map { flex: 1; height: 100%; background: #0b0b0b; position: relative; }
        .list-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; color: #ccc; }
        .list-item:hover { background: #2a2a2a; color: #ffcc00; }
        h3 { text-align: center; color: #ffcc00; margin: 15px 0; }

        /* PANNELLO EDIT COMPATTO IN BASSO A DESTRA */
        #add-point-panel {
            position: absolute; 
            bottom: 50px; /* Posizionato sopra il pannello coordinate (che è alto circa 40px) */
            right: 10px;
            background: rgba(26, 26, 26, 0.95); color: white;
            padding: 10px; border: 1px solid #ffcc00; border-radius: 8px;
            z-index: 2000; 
            width: 180px; /* Ridotto */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        h4 { margin: 0 0 8px 0; color: #ffcc00; font-size: 14px; text-align: center; }
        
        input { 
            width: 88%; margin-bottom: 6px; padding: 5px; 
            background: #333; color: white; border: 1px solid #555; 
            font-size: 12px; border-radius: 4px;
        }
        
        button { 
            width: 100%; padding: 6px; margin-top: 3px; 
            border: none; cursor: pointer; font-weight: bold; 
            transition: 0.2s; font-size: 11px; border-radius: 4px;
        }
        
        .btn-add { background: #ffcc00; color: #000; }
        .btn-undo { background: #444; color: #eee; font-size: 10px; }
        .btn-discord { background: #5865F2; color: white; margin-top: 10px; height: 35px; }
        button:hover { opacity: 0.8; transform: scale(1.02); }

        /* PANNELLO COORDINATE LIVE */
        #coords-display {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.7); color: #ffcc00;
            padding: 5px 10px; border: 1px solid #ffcc00; 
            font-family: monospace; z-index: 2000; font-size: 12px;
            border-radius: 4px; min-width: 180px; text-align: center;
        }
        .session-info { font-size: 10px; color: #aaa; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>HORSE MAP CROWLEY</h3>
    <div id="point-list"></div>
</div>

<div id="map">
    <div id="add-point-panel">
        <h4>Editor</h4>
        <input type="text" id="p-name" placeholder="Nome punto...">
        <input type="text" id="p-coords" placeholder="Clicca mappa" readonly>
        <button class="btn-add" onclick="addNewPoint()">Aggiungi</button>
        <button class="btn-undo" onclick="undoLastPoint()">Annulla</button>
        
        <div class="session-info">
            Punti: <b id="count-val" style="color:#ffcc00">0</b>
        </div>

        <hr style="border: 0; border-top: 1px solid #444; margin: 8px 0;">
        
        <button class="btn-discord" onclick="sendToDiscord()">INVIA A DISCORD</button>
    </div>
    <div id="coords-display">Lat: 0.0, Lng: 0.0</div>
</div>

<script>
    const imgName = 'J10RailroadEngineerRDR2MapLight24.jpg';
    let map, listDiv;
    let savedPoints = []; 
    let sessionMarkers = [];

    const permanentPoints = [
        { name: "Ardennes_BayRoan", coords: [210, 311.3] },
        { name: "Belgian_BlondChestnut", coords: [631.5, 592.1] },
        { name: "Breton_RedRoan", coords: [610.3, 516.2] },
        { name: "DutchWarmblood_ChocolateRoan", coords: [579.3, 835] },
    ];

    function initMap() {
        if (typeof L === 'undefined') return;
        map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 5, zoomSnap: 0.1 });
        const uiPanel = document.getElementById('add-point-panel');
    L.DomEvent.disableClickPropagation(uiPanel);
    L.DomEvent.disableScrollPropagation(uiPanel);
        const bounds = [[0, 0], [1000, 1000]];
        L.imageOverlay(imgName, bounds, { maxNativeZoom: 2, maxZoom: 5 }).addTo(map);
        map.fitBounds(bounds);
        listDiv = document.getElementById('point-list');

        permanentPoints.forEach(p => addMarkerToList(p, false));

        map.on('mousemove', (e) => {
            document.getElementById('coords-display').innerHTML = `Lat: ${e.latlng.lat.toFixed(1)}, Lng: ${e.latlng.lng.toFixed(1)}`;
        });

        map.on('click', (e) => {
            document.getElementById('p-coords').value = `${e.latlng.lat.toFixed(1)}, ${e.latlng.lng.toFixed(1)}`;
        });
    }

    function addMarkerToList(p, isNew) {
        const marker = L.marker(p.coords).addTo(map).bindPopup(`<b>${p.name}</b>`);
        if(isNew) sessionMarkers.push(marker);

        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerText = p.name;
        item.onclick = () => { map.setView(p.coords, 3); marker.openPopup(); };
        listDiv.appendChild(item);
    }

    function addNewPoint() {
        const name = document.getElementById('p-name').value;
        const coordsRaw = document.getElementById('p-coords').value;
        if (!name || !coordsRaw) { alert("Nome o coordinate mancanti!"); return; }

        const coords = coordsRaw.split(',').map(Number);
        const newP = { name: name, coords: coords };
        savedPoints.push(newP);
        addMarkerToList(newP, true);

        document.getElementById('count-val').innerText = savedPoints.length;
        document.getElementById('p-name').value = '';
        document.getElementById('p-coords').value = '';
    }

    function undoLastPoint() {
        if (savedPoints.length === 0) return;
        savedPoints.pop();
        map.removeLayer(sessionMarkers.pop());
        listDiv.removeChild(listDiv.lastChild);
        document.getElementById('count-val').innerText = savedPoints.length;
    }

    async function sendToDiscord() {
        if (savedPoints.length === 0) { alert("Nessun punto da inviare!"); return; }

        const webhookURL = "https://discord.com/api/webhooks/1482787286180696237/QWpblUkLsglF0zWByCS2PWE4Agnj4ETRcug9fCmUOY8qKw6TpTRr4j3g_P1EnIOlzyut";

        let pointsText = "Nuovi punti per il file:\n```javascript\n";
        savedPoints.forEach(p => {
            pointsText += `{ name: "${p.name}", coords: [${p.coords[0]}, ${p.coords[1]}] },\n`;
        });
        pointsText += "```";

        const payload = {
            username: "RDR2 Map Bot",
            embeds: [{
                title: "📍 Nuovi Punti Ricevuti",
                description: pointsText,
                color: 16764160
            }]
        };

        try {
            const response = await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("✅ Inviato a Discord!");
                savedPoints = [];
                sessionMarkers.forEach(m => map.removeLayer(m));
                sessionMarkers = [];
                document.getElementById('count-val').innerText = "0";
            } else {
                alert("❌ Errore Webhook.");
            }
        } catch (error) {
            alert("❌ Errore di connessione.");
        }
    }

    window.onload = initMap;
</script>
</body>
</html>
