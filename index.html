<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RDR2 Railroad Map</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; display: flex; height: 100vh; font-family: sans-serif; }
        #sidebar { width: 250px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; height: 100vh; background: #0b0b0b; }
        .list-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .list-item:hover { background: #2a2a2a; color: #ffcc00; }
        /* Box di caricamento visibile */
        #status { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; z-index: 2000; border: 1px solid #ffcc00; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="text-align:center; color:#ffcc00">PUNTI FERROVIARI</h3>
    <div id="point-list"></div>
</div>

<div id="status">Stato: Inizializzazione...</div>
<div id="map"></div>

<script>
    const imgUrl = 'https://files.catbox.moe/5syah5.jpg';
    const status = document.getElementById('status');

    // 1. Inizializzazione Mappa con CRS Simple
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -3,
        maxZoom: 2,
        center: [500, 500],
        zoom: -1
    });

    // 2. Definizione Confini (0-1000)
    const bounds = [[0, 0], [1000, 1000]];
    
    // 3. Caricamento Immagine
    const mapImage = L.imageOverlay(imgUrl, bounds, {
        interactive: true,
        opacity: 1
    }).addTo(map);

    status.innerHTML = "Stato: Download immagine in corso (25MB)...";

    mapImage.on('load', function() {
        status.innerHTML = "Stato: Mappa Caricata!";
        setTimeout(() => status.style.display = 'none', 3000);
    });

    mapImage.on('error', function() {
        status.innerHTML = "ERRORE: Impossibile caricare l'immagine. Controlla il link.";
        status.style.color = "red";
    });

    // 4. Esempio Punto di Test
    const poi = [
        { name: "Esempio Posizione", coords: [500, 500] }
    ];

    const listDiv = document.getElementById('point-list');
    poi.forEach(p => {
        const marker = L.marker(p.coords).addTo(map).bindPopup(p.name);
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerText = p.name;
        item.onclick = () => { map.setView(p.coords, 1); marker.openPopup(); };
        listDiv.appendChild(item);
    });

    // 5. Tool per Coordinate (F12 Console)
    map.on('click', function(e) {
        console.log("Coordinate per il codice: [" + e.latlng.lat.toFixed(1) + ", " + e.latlng.lng.toFixed(1) + "]");
    });

    map.fitBounds(bounds);
</script>
</body>
</html>
