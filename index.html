<!DOCTYPE html>
<html>
<head>
    <title>RDR2 Map</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; display: flex; background: #111; color: white; font-family: sans-serif; }
        #sidebar { width: 250px; height: 100vh; background: #222; overflow-y: auto; }
        #map { flex-grow: 1; height: 100vh; background: #000; }
        .list-item { padding: 10px; border-bottom: 1px solid #444; cursor: pointer; }
        .list-item:hover { background: #333; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="text-align:center">Punti Ferroviari</h3>
    <div id="point-list"></div>
</div>
<div id="map"></div>

<script>
    // IL TUO LINK
    const myImage = 'https://files.catbox.moe/enqjwl.jpg';

    // Setup mappa semplice (coordinate da 0 a 100)
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -2
    });

    const bounds = [[0,0], [100, 100]]; // Mappa trattata come un quadrato 100x100
    L.imageOverlay(myImage, bounds).addTo(map);
    map.fitBounds(bounds);

    // ESEMPIO DI PUNTI (Usa numeri da 0 a 100)
    // [Y, X] -> 100,0 è in alto a sinistra / 0,100 è in basso a destra
    const points = [
        { name: "Punto d'inizio", coords: [80, 20] },
        { name: "Stazione Centrale", coords: [50, 50] }
    ];

    const listDiv = document.getElementById('point-list');
    points.forEach(p => {
        const marker = L.marker(p.coords).addTo(map).bindPopup(p.name);
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerText = p.name;
        item.onclick = () => { map.setView(p.coords, 1); marker.openPopup(); };
        listDiv.appendChild(item);
    });

    // CLICCA SULLA MAPPA PER VEDERE LE COORDINATE IN CONSOLE (F12)
    map.on('click', function(e) {
        console.log("Coordinate: [" + e.latlng.lat.toFixed(1) + ", " + e.latlng.lng.toFixed(1) + "]");
    });
</script>
</body>
</html>
