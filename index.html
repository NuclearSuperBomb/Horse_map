<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RDR2 Railroad Map</title>
    <!-- Link ufficiali Leaflet aggiornati -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" />
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
        body { display: flex; font-family: sans-serif; }
        #sidebar { width: 250px; background: #1a1a1a; color: white; border-right: 1px solid #333; overflow-y: auto; z-index: 1000; }
        #map { flex: 1; height: 100%; background: #0b0b0b; }
        .list-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; color: #ccc; }
        .list-item:hover { background: #2a2a2a; color: #ffcc00; }
        h3 { text-align: center; color: #ffcc00; margin: 20px 0; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>PUNTI FERROVIARI</h3>
    <div id="point-list"></div>
</div>

<div id="map"></div>

<script>
    // Verifica che il nome file sia identico a quello su GitHub
    const imgName = 'J10RailroadEngineerRDR2MapLight24.jpg';

    // Funzione di avvio
    function initMap() {
        // Se Leaflet è caricato correttamente, 'L' esiste
        if (typeof L === 'undefined') {
            console.error("Errore: Libreria Leaflet non caricata!");
            return;
        }

        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3,
            maxZoom: 2
        });

        // Griglia 0-1000 per posizionare l'immagine
        const bounds = [[0, 0], [1000, 1000]];
        
        // Caricamento immagine locale
        const mapImage = L.imageOverlay(imgName, bounds).addTo(map);

        // Centra e forza il ricalcolo delle dimensioni
        map.fitBounds(bounds);
        setTimeout(() => { map.invalidateSize(); }, 300);

        // Esempio Punto (Centro Mappa)
        const points = [{ name: "Punto di Test", coords: [500, 500] }];
        const listDiv = document.getElementById('point-list');

        points.forEach(p => {
            const marker = L.marker(p.coords).addTo(map).bindPopup(p.name);
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerText = p.name;
            item.onclick = () => { map.setView(p.coords, 1); marker.openPopup(); };
            listDiv.appendChild(item);
        });

        // Log coordinate in Console (F12) per aggiungere nuovi punti
        map.on('click', function(e) {
            console.log("Nuove Coordinate: [" + e.latlng.lat.toFixed(1) + ", " + e.latlng.lng.toFixed(1) + "]");
        });
    }

    // Avvia quando tutto è pronto
    window.onload = initMap;
</script>
</body>
</html>
