<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RDR2 Map</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        /* Forza l'altezza al 100% per evitare che la mappa collassi a 0 pixel */
        html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
        body { display: flex; font-family: sans-serif; }
        #sidebar { width: 250px; background: #1a1a1a; color: white; border-right: 1px solid #333; overflow-y: auto; z-index: 1000; }
        #map { flex: 1; height: 100%; background: #000; }
        .list-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; color: #ccc; }
        .list-item:hover { background: #2a2a2a; color: #ffcc00; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="text-align:center; color:#ffcc00">PUNTI FERROVIARI</h3>
    <div id="point-list"></div>
</div>

<div id="map"></div>

<script>
    // 1. ATTENZIONE: Il nome deve essere ESATTAMENTE come su GitHub (Maiuscole incluse!)
    const imgName = 'J10RailroadEngineerRDR2MapLight24.jpg';

    // Inizializziamo la mappa solo quando il DOM è pronto
    window.onload = function() {
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3,
            maxZoom: 2
        });

        // Definiamo un'area di lavoro standard
        const bounds = [[0, 0], [1000, 1000]];
        
        // Carichiamo l'immagine
        const mapImage = L.imageOverlay(imgName, bounds).addTo(map);

        // Forza la mappa a riconoscere la sua dimensione e centra l'immagine
        map.fitBounds(bounds);
        setTimeout(() => { map.invalidateSize(); }, 200);

        // Esempio punto
        const points = [{ name: "Test Point", coords: [500, 500] }];
        const listDiv = document.getElementById('point-list');

        points.forEach(p => {
            const marker = L.marker(p.coords).addTo(map).bindPopup(p.name);
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerText = p.name;
            item.onclick = () => { map.setView(p.coords, 1); marker.openPopup(); };
            listDiv.appendChild(item);
        });

        // Clicca per vedere le coordinate in Console (F12)
        map.on('click', function(e) {
            console.log("Coords: [" + e.latlng.lat.toFixed(1) + ", " + e.latlng.lng.toFixed(1) + "]");
        });
    };
</script>
</body>
</html>
