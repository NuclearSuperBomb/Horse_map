<!DOCTYPE html>
<html>
<head>
    <title>RDR2 Interactive Map</title>
    <style>
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>Mappa Ferroviaria J10</h1>
    <!-- Assicurati che il nome del file immagine sia identico a quello che caricherai -->
    <img src="https://files.catbox.moe/enqjwl.jpg" usemap="#image-map">

    <map name="image-map">
        <!-- Qui aggiungi il link nel campo href -->
        <area target="_blank" alt="Stazione" title="Stazione" href="https://google.com" coords="5070,12508,7629,12508,6865,11686" shape="poly">
    </map>
</body>
</html>
