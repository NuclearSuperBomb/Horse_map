<!DOCTYPE html>
<html>
<head>
    <title>RDR2 Railroad Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; display: flex; background: #121212; color: #e0e0e0; font-family: sans-serif; }
        #sidebar { width: 250px; height: 100vh; background: #1e1e1e; overflow-y: auto; border-right: 1px solid #333; z-index: 1000; }
        #map { flex-grow: 1; height: 100vh; background: #000; }
        .list-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .list-item:hover { background: #2a2a2a; color: #ffcc00; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="text-align:center; color:#ffcc00">PUNTI FERROVIARI</h3>
    <div id="point-list"></div>
</div>

<div id="map"></div>

<script>
    // 1. Setup dimensioni reali dell'immagine
    const w = 11322; 
    const h = 8251;
    const url = 'https://files.catbox.moe';

    // 2. Inizializza la mappa
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -4,
        maxZoom: 2
    });

    // 3. Definiamo i confini: [ [0,0], [altezza, larghezza] ]
    const southWest = map.unproject([0, h], map.getMaxZoom());
    const northEast = map.unproject([w, 0], map.getMaxZoom());
    const bounds = new L.LatLngBounds(southWest, northEast);

    // Aggiungiamo l'immagine
    L.imageOverlay(url, bounds).addTo(map);

    // Centriamo la mappa
    map.setMaxBounds(bounds);
    map.fitBounds(bounds);

    // 4. Esempio Punti (Coordinate placeholder)
    const points = [
        { name: "Punto Prova 1", coords: [-30, 40] },
        { name: "Punto Prova 2", coords: [-50, 100] }
    ];

    const listDiv = document.getElementById('point-list');
    points.forEach(p => {
        const marker = L.marker(p.coords).addTo(map).bindPopup(p.name);
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerText = p.name;
        item.onclick = () => { map.setView(p.coords, 0); marker.openPopup(); };
        listDiv.appendChild(item);
    });

    // --- FUNZIONE PER TROVARE LE COORDINATE ---
    // Clicca sulla mappa e premi F12 (Console) per vedere dove hai cliccato
    map.on('click', function(e) {
        console.log("Coordinate cliccate: [" + e.latlng.lat + ", " + e.latlng.lng + "]");
    });
</script>
</body>
</html>
