<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RDR2 Railroad Map - Community Editor</title>
    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
        body { display: flex; font-family: sans-serif; }
        #sidebar { width: 250px; background: #1a1a1a; color: white; border-right: 1px solid #333; overflow-y: auto; z-index: 1000; }
        #map { flex: 1; height: 100%; background: #0b0b0b; position: relative; }
        
        .list-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; color: #ccc; }
        .list-item:hover { background: #2a2a2a; color: #ffcc00; }
        h3 { text-align: center; color: #ffcc00; margin: 15px 0; }

        #add-point-panel {
            position: absolute; top: 10px; left: 260px;
            background: rgba(26, 26, 26, 0.95); color: white;
            padding: 15px; border: 1px solid #ffcc00; border-radius: 8px;
            z-index: 2000; width: 220px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input { width: 92%; margin-bottom: 10px; padding: 6px; background: #333; color: white; border: 1px solid #555; }
        button { width: 100%; padding: 10px; margin-top: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #ffcc00; color: #000; }
        .btn-undo { background: #444; color: #eee; font-size: 11px; margin-top: 5px; }
        .btn-github { background: #2ea44f; color: white; margin-top: 15px; height: 50px; }
        button:hover { opacity: 0.8; transform: scale(1.02); }

        #coords-display {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.7); color: #ffcc00;
            padding: 5px 10px; border: 1px solid #ffcc00; font-family: monospace; z-index: 2000;
        }
        .session-info { font-size: 11px; color: #aaa; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>PUNTI FERROVIARI</h3>
    <div id="point-list"></div>
</div>

<div id="map">
    <div id="add-point-panel">
        <h4 style="margin:0 0 10px 0; color:#ffcc00">Sessione Contributo</h4>
        <input type="text" id="p-name" placeholder="Nome punto...">
        <input type="text" id="p-coords" placeholder="Clicca sulla mappa" readonly>
        <button class="btn-add" onclick="addNewPoint()">Aggiungi alla Lista</button>
        <button class="btn-undo" onclick="undoLastPoint()">Annulla Ultimo Click</button>
        
        <div class="session-info">
            Punti in attesa: <b id="count-val" style="color:#ffcc00">0</b>
        </div>

        <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
        
        <button class="btn-github" onclick="submitAllToGithub()">INVIA TUTTI SU GITHUB</button>
    </div>
    <div id="coords-display">Lat: 0.0, Lng: 0.0</div>
</div>

<script>
    const imgName = 'J10RailroadEngineerRDR2MapLight24.jpg';
    let map, listDiv;
    let savedPoints = []; 
    let sessionMarkers = []; // Per poterli rimuovere con "Annulla"

    // Qui incollerai i punti approvati in futuro
    const permanentPoints = [];

    function initMap() {
        if (typeof L === 'undefined') return;

        map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 5, zoomSnap: 0.1 });
        const bounds = [[0, 0], [1000, 1000]];
        L.imageOverlay(imgName, bounds, { maxNativeZoom: 2, maxZoom: 5 }).addTo(map);
        map.fitBounds(bounds);
        listDiv = document.getElementById('point-list');

        permanentPoints.forEach(p => addMarkerToList(p, false));

        map.on('mousemove', (e) => {
            document.getElementById('coords-display').innerHTML = `Lat: ${e.latlng.lat.toFixed(1)}, Lng: ${e.latlng.lng.toFixed(1)}`;
        });

        map.on('click', (e) => {
            document.getElementById('p-coords').value = `${e.latlng.lat.toFixed(1)}, ${e.latlng.lng.toFixed(1)}`;
        });
    }

    function addMarkerToList(p, isNew) {
        const marker = L.marker(p.coords).addTo(map).bindPopup(`<b>${p.name}</b>`);
        if(isNew) sessionMarkers.push(marker);

        const item = document.createElement('div');
        item.className = 'list-item';
        item.id = isNew ? 'session-' + (sessionMarkers.length - 1) : '';
        item.innerText = p.name;
        item.onclick = () => { map.setView(p.coords, 3); marker.openPopup(); };
        listDiv.appendChild(item);
    }

    function addNewPoint() {
        const name = document.getElementById('p-name').value;
        const coordsRaw = document.getElementById('p-coords').value;
        
        if (!name || !coordsRaw) { alert("Nome o coordinate mancanti!"); return; }

        const coords = coordsRaw.split(',').map(Number);
        const newP = { name: name, coords: coords };
        
        savedPoints.push(newP);
        addMarkerToList(newP, true);

        document.getElementById('count-val').innerText = savedPoints.length;
        document.getElementById('p-name').value = '';
        document.getElementById('p-coords').value = '';
    }

    function undoLastPoint() {
        if (savedPoints.length === 0) return;
        
        savedPoints.pop();
        const lastMarker = sessionMarkers.pop();
        map.removeLayer(lastMarker);
        
        listDiv.removeChild(listDiv.lastChild);
        document.getElementById('count-val').innerText = savedPoints.length;
    }

    function submitAllToGithub() {
        if (savedPoints.length === 0) { alert("Aggiungi almeno un punto prima di inviare!"); return; }

        const repoUrl = "https://github.com";
        const title = "CONTRIBUTO MAPPA: " + savedPoints.length + " nuovi punti";
        
        let bodyContent = "Per favore aggiungi questi punti al file index.html:\n\n```javascript\n";
        savedPoints.forEach(p => {
            bodyContent += `    { name: "${p.name}", coords: [${p.coords[0]}, ${p.coords[1]}] },\n`;
        });
        bodyContent += "```";

        const finalUrl = `${repoUrl}?title=${encodeURIComponent(title)}&body=${encodeURIComponent(bodyContent)}`;
        
        if (finalUrl.length < 2000) {
            window.open(finalUrl, '_blank');
        } else {
            navigator.clipboard.writeText(bodyContent).then(() => {
                alert("Troppi punti! Il codice è stato copiato negli appunti.\nIncolla (Ctrl+V) nel box di descrizione su GitHub.");
                window.open(`${repoUrl}?title=${encodeURIComponent(title)}`, '_blank');
            });
        }
    }

    window.onload = initMap;
</script>
</body>
</html>
